<div class="masthead">

<div class="masthead__inner-wrap">

<div class="masthead__menu">

<nav id="site-nav" class="greedy-nav">

<button><div class="navicon"></div></button>

<ul class="visible-links">

<li class="masthead__menu-item masthead__menu-item--lg masthead__menu-home-item"><a href="#about-me" data-nav-en="Homepage" data-nav-zh="主页">Homepage</a></li>

{% for link in site.data.navigation.main %}

<li class="masthead__menu-item"><a href="{{ domain }}{{ link.url }}" data-nav-en="{{ link.title }}" data-nav-zh="{{ link.title_zh }}">{{ link.title }}</a></li>

{% endfor %}

</ul>

<ul class="hidden-links hidden"></ul>

<button id="lang-toggle-btn" class="lang-toggle-btn" title="Switch to Chinese">中文</button>

</nav>

</div>

</div>

</div>
